<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | EduCore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary, #0f172a);
      color: var(--text-primary, #f8fafc);
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background: var(--card-bg, #1e293b);
      border-bottom: 1px solid var(--border-color, #334155);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--hover-bg, #334155);
      border: none;
      color: var(--text-secondary, #94a3b8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .back-btn:hover {
      color: var(--text-primary, #f8fafc);
    }
    
    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .save-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    .save-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* Main Content */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    
    /* Profile Header */
    .profile-header {
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 24px;
    }
    
    .avatar-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 600;
      color: white;
    }
    
    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .avatar-edit {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: var(--card-bg, #1e293b);
      border: 2px solid var(--border-color, #334155);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary, #94a3b8);
      transition: all 0.2s ease;
    }
    
    .avatar-edit:hover {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    
    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .profile-role {
      color: var(--text-secondary, #94a3b8);
      font-size: 0.95rem;
    }
    
    .profile-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 12px;
    }
    
    /* Cards */
    .card {
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 16px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color, #334155);
    }
    
    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.05rem;
      font-weight: 600;
    }
    
    .card-title svg {
      color: #3b82f6;
    }
    
    .card-body {
      padding: 24px;
    }
    
    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    .form-group label {
      display: block;
      color: var(--text-secondary, #94a3b8);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg, #0f172a);
      border: 1px solid var(--border-color, #334155);
      border-radius: 10px;
      color: var(--text-primary, #f8fafc);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    .form-group input:disabled,
    .form-group select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .form-hint {
      color: var(--text-muted, #64748b);
      font-size: 0.8rem;
      margin-top: 6px;
    }
    
    /* Password section */
    .password-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .password-input-wrapper {
      position: relative;
    }
    
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted, #64748b);
      cursor: pointer;
      padding: 4px;
    }
    
    .password-toggle:hover {
      color: var(--text-secondary, #94a3b8);
    }
    
    .password-requirements {
      background: var(--bg-tertiary, #334155);
      border-radius: 8px;
      padding: 12px 16px;
    }
    
    .password-requirements h4 {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary, #94a3b8);
    }
    
    .requirement {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted, #64748b);
      margin-bottom: 4px;
    }
    
    .requirement.met {
      color: #22c55e;
    }
    
    .requirement svg {
      flex-shrink: 0;
    }
    
    /* Messages */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border-color, #334155);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    .toast.success {
      border-color: rgba(34, 197, 94, 0.3);
    }
    
    .toast.success .toast-icon {
      color: #22c55e;
    }
    
    .toast.error {
      border-color: rgba(239, 68, 68, 0.3);
    }
    
    .toast.error .toast-icon {
      color: #ef4444;
    }
    
    .toast-message {
      color: var(--text-primary, #f8fafc);
      font-size: 0.95rem;
    }
    
    /* Account Actions */
    .account-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: transparent;
      border: 1px solid var(--border-color, #334155);
      border-radius: 10px;
      color: var(--text-primary, #f8fafc);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .action-btn:hover {
      background: var(--hover-bg, #334155);
    }
    
    .action-btn-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .action-btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .action-btn-text h4 {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .action-btn-text p {
      font-size: 0.8rem;
      color: var(--text-secondary, #94a3b8);
    }
    
    .action-btn.danger {
      border-color: rgba(239, 68, 68, 0.3);
    }
    
    .action-btn.danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    
    .action-btn.danger .action-btn-icon {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    
    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Hide file input */
    #avatarInput {
      display: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="goBack()" aria-label="Go back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1>My Profile</h1>
    </div>
    <button class="save-btn" id="saveBtn" onclick="saveProfile()" disabled>
      <span>Save Changes</span>
    </button>
  </header>
  
  <main class="main">
    <!-- Profile Header -->
    <section class="profile-header">
      <div class="avatar-container">
        <div class="avatar" id="profileAvatar">JS</div>
        <label class="avatar-edit" for="avatarInput" title="Change photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </label>
        <input type="file" id="avatarInput" accept="image/*">
      </div>
      <h2 class="profile-name" id="profileName">Loading...</h2>
      <p class="profile-role" id="profileRole">Student</p>
      <span class="profile-badge" id="profileBadge">Loading...</span>
    </section>
    
    <!-- Personal Information -->
    <section class="card">
      <div class="card-header">
        <h3 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Personal Information
        </h3>
      </div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="Enter first name">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Enter last name">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number">
          </div>
        </div>
        <div class="form-group">
          <label for="identifier">Admission Number / Employee ID</label>
          <input type="text" id="identifier" disabled>
          <p class="form-hint">This cannot be changed. Contact admin for corrections.</p>
        </div>
      </div>
    </section>
    
    <!-- Change Password -->
    <section class="card">
      <div class="card-header">
        <h3 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Change Password
        </h3>
      </div>
      <div class="card-body">
        <div class="password-section">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="currentPassword" placeholder="Enter current password">
              <button class="password-toggle" type="button" onclick="togglePassword('currentPassword')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="newPassword" placeholder="Enter new password" oninput="checkPasswordRequirements()">
              <button class="password-toggle" type="button" onclick="togglePassword('newPassword')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirmPassword" placeholder="Confirm new password" oninput="checkPasswordRequirements()">
              <button class="password-toggle" type="button" onclick="togglePassword('confirmPassword')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          
          <div class="password-requirements" id="passwordRequirements" style="display: none;">
            <h4>Password Requirements</h4>
            <div class="requirement" id="reqLength">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
              <span>At least 8 characters</span>
            </div>
            <div class="requirement" id="reqMatch">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
              <span>Passwords match</span>
            </div>
          </div>
          
          <button class="save-btn" id="changePasswordBtn" onclick="changePassword()" style="width: fit-content;">
            <span>Update Password</span>
          </button>
        </div>
      </div>
    </section>
    
    <!-- Account Actions -->
    <section class="card">
      <div class="card-header">
        <h3 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Account
        </h3>
      </div>
      <div class="card-body">
        <div class="account-actions">
          <button class="action-btn" onclick="exportData()">
            <div class="action-btn-content">
              <div class="action-btn-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
              </div>
              <div class="action-btn-text">
                <h4>Export My Data</h4>
                <p>Download all your data in JSON format</p>
              </div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
          
          <button class="action-btn" onclick="logout()">
            <div class="action-btn-content">
              <div class="action-btn-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
              </div>
              <div class="action-btn-text">
                <h4>Sign Out</h4>
                <p>Log out from this device</p>
              </div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>
  
  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </span>
    <span class="toast-message" id="toastMessage">Changes saved successfully</span>
  </div>
  
  <script src="config.js"></script>
  <script src="js/theme-manager.js"></script>
  <script>
    var API = CONFIG.API_BASE_URL;
    var userRole = '';
    var token = '';
    var user = {};
    var originalData = {};
    var hasChanges = false;
    
    // Detect role from URL or storage
    function detectRole() {
      var params = new URLSearchParams(window.location.search);
      var role = params.get('role');
      
      if (role === 'teacher' || localStorage.getItem(CONFIG.STORAGE_KEYS.TEACHER_TOKEN)) {
        userRole = 'teacher';
        token = localStorage.getItem(CONFIG.STORAGE_KEYS.TEACHER_TOKEN);
        user = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEYS.TEACHER_USER) || '{}');
      } else if (role === 'admin' || localStorage.getItem(CONFIG.STORAGE_KEYS.ADMIN_TOKEN)) {
        userRole = 'admin';
        token = localStorage.getItem(CONFIG.STORAGE_KEYS.ADMIN_TOKEN);
        user = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEYS.ADMIN_USER) || '{}');
      } else {
        userRole = 'student';
        token = localStorage.getItem(CONFIG.STORAGE_KEYS.STUDENT_TOKEN);
        user = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEYS.STUDENT_USER) || '{}');
      }
      
      if (!token) {
        window.location.href = 'index.html';
        return false;
      }
      
      return true;
    }
    
    // Initialize
    function init() {
      if (!detectRole()) return;
      loadProfile();
      setupFormListeners();
    }
    
    function loadProfile() {
      // Set initial data from storage
      var name = user.name || user.fullName || '';
      var nameParts = name.split(' ');
      
      document.getElementById('profileName').textContent = name || 'User';
      document.getElementById('profileRole').textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);
      document.getElementById('profileAvatar').textContent = CONFIG.getInitials(name);
      document.getElementById('profileBadge').textContent = user.admissionNumber || user.employeeId || user.email || '';
      
      document.getElementById('firstName').value = nameParts[0] || '';
      document.getElementById('lastName').value = nameParts.slice(1).join(' ') || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('phone').value = user.phone || '';
      document.getElementById('identifier').value = user.admissionNumber || user.employeeId || user.email || '';
      
      // Store original for comparison
      originalData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
      };
      
      // Fetch latest from API
      fetch(API + '/auth/profile', {
        headers: CONFIG.getAuthHeaders(token)
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success && data.user) {
          var u = data.user;
          var nm = u.name || u.fullName || '';
          var parts = nm.split(' ');
          
          document.getElementById('firstName').value = parts[0] || '';
          document.getElementById('lastName').value = parts.slice(1).join(' ') || '';
          document.getElementById('email').value = u.email || '';
          document.getElementById('phone').value = u.phone || '';
          
          originalData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
          };
        }
      })
      .catch(function(err) {
        console.warn('Could not fetch profile:', err);
      });
    }
    
    function setupFormListeners() {
      var inputs = document.querySelectorAll('#firstName, #lastName, #email, #phone');
      inputs.forEach(function(input) {
        input.addEventListener('input', checkForChanges);
      });
    }
    
    function checkForChanges() {
      var current = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
      };
      
      hasChanges = JSON.stringify(current) !== JSON.stringify(originalData);
      document.getElementById('saveBtn').disabled = !hasChanges;
    }
    
    function saveProfile() {
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      
      var data = {
        name: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
      };
      
      fetch(API + '/auth/profile', {
        method: 'PUT',
        headers: CONFIG.getAuthHeaders(token),
        body: JSON.stringify(data)
      })
      .then(function(res) { return res.json(); })
      .then(function(result) {
        btn.innerHTML = '<span>Save Changes</span>';
        
        if (result.success) {
          // Update stored user
          user.name = data.name;
          user.email = data.email;
          user.phone = data.phone;
          
          var storageKey = userRole === 'teacher' ? CONFIG.STORAGE_KEYS.TEACHER_USER :
                          userRole === 'admin' ? CONFIG.STORAGE_KEYS.ADMIN_USER :
                          CONFIG.STORAGE_KEYS.STUDENT_USER;
          localStorage.setItem(storageKey, JSON.stringify(user));
          
          // Update UI
          document.getElementById('profileName').textContent = data.name;
          document.getElementById('profileAvatar').textContent = CONFIG.getInitials(data.name);
          
          originalData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
          };
          
          hasChanges = false;
          btn.disabled = true;
          
          showToast('Profile updated successfully', 'success');
        } else {
          showToast(result.message || 'Failed to update profile', 'error');
        }
      })
      .catch(function(err) {
        btn.innerHTML = '<span>Save Changes</span>';
        showToast(CONFIG.ERRORS.CONNECTION_FAILED, 'error');
      });
    }
    
    // Password
    function togglePassword(inputId) {
      var input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    function checkPasswordRequirements() {
      var newPass = document.getElementById('newPassword').value;
      var confirmPass = document.getElementById('confirmPassword').value;
      
      var reqBox = document.getElementById('passwordRequirements');
      reqBox.style.display = newPass ? 'block' : 'none';
      
      // Length requirement
      var reqLength = document.getElementById('reqLength');
      if (newPass.length >= 8) {
        reqLength.classList.add('met');
        reqLength.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
      } else {
        reqLength.classList.remove('met');
        reqLength.querySelector('svg').innerHTML = '<circle cx="12" cy="12" r="10"></circle>';
      }
      
      // Match requirement
      var reqMatch = document.getElementById('reqMatch');
      if (newPass && newPass === confirmPass) {
        reqMatch.classList.add('met');
        reqMatch.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
      } else {
        reqMatch.classList.remove('met');
        reqMatch.querySelector('svg').innerHTML = '<circle cx="12" cy="12" r="10"></circle>';
      }
    }
    
    function changePassword() {
      var currentPass = document.getElementById('currentPassword').value;
      var newPass = document.getElementById('newPassword').value;
      var confirmPass = document.getElementById('confirmPassword').value;
      
      if (!currentPass) {
        showToast('Please enter your current password', 'error');
        return;
      }
      
      if (newPass.length < 8) {
        showToast('New password must be at least 8 characters', 'error');
        return;
      }
      
      if (newPass !== confirmPass) {
        showToast('Passwords do not match', 'error');
        return;
      }
      
      var btn = document.getElementById('changePasswordBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      
      fetch(API + '/auth/change-password', {
        method: 'POST',
        headers: CONFIG.getAuthHeaders(token),
        body: JSON.stringify({
          currentPassword: currentPass,
          newPassword: newPass
        })
      })
      .then(function(res) { return res.json(); })
      .then(function(result) {
        btn.disabled = false;
        btn.innerHTML = '<span>Update Password</span>';
        
        if (result.success) {
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
          document.getElementById('passwordRequirements').style.display = 'none';
          
          showToast('Password changed successfully', 'success');
        } else {
          showToast(result.message || 'Failed to change password', 'error');
        }
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.innerHTML = '<span>Update Password</span>';
        showToast(CONFIG.ERRORS.CONNECTION_FAILED, 'error');
      });
    }
    
    // Avatar
    document.getElementById('avatarInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      
      if (file.size > 5 * 1024 * 1024) {
        showToast('Image must be less than 5MB', 'error');
        return;
      }
      
      var reader = new FileReader();
      reader.onload = function(ev) {
        var avatar = document.getElementById('profileAvatar');
        avatar.innerHTML = '<img src="' + ev.target.result + '" alt="Profile">';
        
        // Upload to server (if endpoint exists)
        // uploadAvatar(file);
      };
      reader.readAsDataURL(file);
    });
    
    // Export data
    function exportData() {
      var exportData = {
        profile: user,
        exportedAt: new Date().toISOString()
      };
      
      var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      
      var a = document.createElement('a');
      a.href = url;
      a.download = 'educore-profile-export.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast('Data exported successfully', 'success');
    }
    
    // Navigation
    function goBack() {
      if (hasChanges) {
        if (!confirm('You have unsaved changes. Are you sure you want to leave?')) {
          return;
        }
      }
      
      var routes = {
        student: CONFIG.ROUTES.STUDENT_DASHBOARD,
        teacher: CONFIG.ROUTES.TEACHER_DASHBOARD,
        admin: CONFIG.ROUTES.ADMIN_DASHBOARD
      };
      window.location.href = routes[userRole] || 'index.html';
    }
    
    function logout() {
      var storageKeys = {
        student: [CONFIG.STORAGE_KEYS.STUDENT_TOKEN, CONFIG.STORAGE_KEYS.STUDENT_USER],
        teacher: [CONFIG.STORAGE_KEYS.TEACHER_TOKEN, CONFIG.STORAGE_KEYS.TEACHER_USER],
        admin: [CONFIG.STORAGE_KEYS.ADMIN_TOKEN, CONFIG.STORAGE_KEYS.ADMIN_USER]
      };
      
      var keys = storageKeys[userRole] || storageKeys.student;
      keys.forEach(function(key) {
        localStorage.removeItem(key);
      });
      
      window.location.href = 'index.html';
    }
    
    // Toast
    function showToast(message, type) {
      var toast = document.getElementById('toast');
      var msgEl = document.getElementById('toastMessage');
      
      toast.className = 'toast ' + type;
      msgEl.textContent = message;
      
      // Update icon
      var iconHtml = type === 'success' 
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
      toast.querySelector('.toast-icon').innerHTML = iconHtml;
      
      toast.classList.add('show');
      
      setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // Init
    init();
  </script>
</body>
</html>
